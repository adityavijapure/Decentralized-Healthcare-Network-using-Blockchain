spring.application.name=backend

# 1. DATABASE CONNECTION
spring.datasource.url=jdbc:postgresql://localhost:5432/healthchain_db
spring.datasource.username=postgres
spring.datasource.password=YOUR_PASSWORD_HERE
spring.datasource.driver-class-name=org.postgresql.Driver

# 2. SERVER CONFIGURATION
server.port=8085

# 3. JPA / HIBERNATE SETTINGS
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# 4. MULTIPART / FILE UPLOAD (Crucial for Doctor Proof & Medical Records)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# 5. SECURITY / CORS (Ensures Spring doesn't reject OPTIONS requests)
spring.main.allow-bean-definition-overriding=true

# Custom property to define where images are stored
file.upload-dir=./uploads/doctor_proofs